<header class="header">
  <div class="header-inner">

    <!-- Left: Menu toggle + Search -->
    <div class="header-left">
      <button class="menu-btn" (click)="onMenuClick()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Tìm kiếm tin đăng, người dùng..."
          class="search-input"
        />
      </div>
    </div>

    <!-- Right: Bell + User dropdown -->
    <div class="header-right">

      <!-- Bell -->
      <button class="bell-btn" title="Thông báo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="bell-dot"></span>
      </button>

      <!-- ✅ Shared dropdown component, size="sm" -->
      <app-user-avatar-dropdown size="sm"></app-user-avatar-dropdown>

    </div>
  </div>
</header>
