<!-- Overlay mobile -->
<div class="sidebar-overlay" [class.active]="isOpen" (click)="close()"></div>

<aside class="sidebar" [class.open]="isOpen">
  <div class="sidebar-inner">
    <!-- Logo -->
    <a routerLink="/" class="flex items-center space-x-2 cursor-pointer">
      <img src="/assets/logo_srf_removebg.png" alt="Home" class="object-contain logo_header" />
      <span class="text-xl lg:text-[18px] font-bold text-gray-900"> RoomFinder.vn </span>
    </a>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      @for (item of menuItems; track item.id) {
        <a [routerLink]="item.route" routerLinkActive="active" class="nav-item" (click)="close()">
          @if (item.icon === 'home') {
            <svg
              class="nav-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9,22 9,12 15,12 15,22" />
            </svg>
          }
          @if (item.icon === 'clock') {
            <svg
              class="nav-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <polyline points="12,6 12,12 16,14" />
            </svg>
          }
          @if (item.icon === 'check-circle') {
            <svg
              class="nav-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22,4 12,14.01 9,11.01" />
            </svg>
          }
          @if (item.icon === 'list') {
            <svg
              class="nav-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="8" y1="6" x2="21" y2="6" />
              <line x1="8" y1="12" x2="21" y2="12" />
              <line x1="8" y1="18" x2="21" y2="18" />
              <line x1="3" y1="6" x2="3.01" y2="6" />
              <line x1="3" y1="12" x2="3.01" y2="12" />
              <line x1="3" y1="18" x2="3.01" y2="18" />
            </svg>
          }
          @if (item.icon === 'users') {
            <svg
              class="nav-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
          }
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- User info + Logout -->
    <!-- <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">{{ adminInitials }}</div>
        <div class="user-details">
          <p class="user-name">{{ adminName }}</p>
          <button class="logout-btn" (click)="logout()">Đăng xuất</button>
        </div>
      </div>
    </div> -->
  </div>
</aside>
