<header class="fixed top-0 left-0 right-0 bg-white shadow-lg z-50">
  <nav class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8 py-3 flex items-center justify-between">
    <!-- Logo -->
    <a routerLink="/" class="flex items-center space-x-2 cursor-pointer">
      <img src="/assets/logo_srf_removebg.png" alt="Home" class="object-contain logo_header" />
      <span
        class="text-xl lg:text-[22px] font-bold text-gray-900"
        [ngClass]="{ 'lg:hidden': currentUser }"
      >
        RoomFinder.vn
      </span>
    </a>

    <!-- Menu desktop -->
    <div class="hidden lg:flex items-center space-x-8">
      <a
        routerLink="/"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link font-medium text-gray-700 hover:text-[#00C897] transition-colors cursor-pointer"
      >
        Trang chủ
      </a>
      <a
        routerLink="/search"
        routerLinkActive="active-link"
        class="nav-link font-medium text-gray-700 hover:text-[#00C897] transition-colors cursor-pointer"
      >
        Tìm phòng
      </a>
      <a
        routerLink="/blog"
        routerLinkActive="active-link"
        class="nav-link font-medium text-gray-700 hover:text-[#00C897] transition-colors cursor-pointer"
      >
        Blog
      </a>

      <div class="relative">
        <input
          type="text"
          placeholder="Tìm kiếm..."
          class="w-56 pl-10 pr-4 py-2 rounded-full border border-gray-300 focus:border-[#00C897] focus:ring-2 focus:ring-[#00C897]/20 outline-none transition-all text-sm"
        />
        <svg
          class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-4.35-4.35M16 10a6 6 0 11-12 0 6 6 0 0112 0z"
          />
        </svg>
      </div>

      <button
        (click)="goToPostRoom()"
        class="bg-[#FF6B6B] text-white px-6 py-2.5 rounded-full hover:bg-[#FF5E3A] transition-colors font-bold cursor-pointer"
      >
        Đăng tin
      </button>
    </div>

    <!-- Auth desktop -->
    <div class="hidden lg:flex items-center space-x-4">
      <!-- Chưa đăng nhập -->
      <button
        *ngIf="!currentUser"
        (click)="openLoginModal()"
        class="border-2 border-[#00C897] text-[#00C897] px-6 py-2.5 rounded-lg font-medium hover:bg-[#00C897]/10 transition-colors cursor-pointer"
      >
        Đăng nhập
      </button>

      <!-- Đã đăng nhập -->
      <div *ngIf="currentUser" class="flex items-center space-x-2">
        <div class="flex items-center space-x-1 mr-2">
          <button
            routerLink="/saved"
            class="p-2 text-gray-500 hover:text-[#FF6B6B] hover:bg-gray-100 rounded-lg transition-colors cursor-pointer"
            title="Tin đã lưu"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
              />
            </svg>
          </button>
          <div class="relative">
            <button
              (click)="toggleNotification()"
              class="p-2 text-gray-500 hover:text-[#00C897] hover:bg-gray-100 rounded-lg transition-colors cursor-pointer relative"
              title="Thông báo"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
                />
              </svg>

              <!-- 🔴 BADGE -->
              <span
                *ngIf="unreadCount > 0"
                class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full leading-none"
              >
                {{ unreadCount > 99 ? '99+' : unreadCount }}
              </span>
            </button>

            <!-- 🔔 DROPDOWN -->
            <div
              *ngIf="showNotification"
              class="absolute right-0 mt-2 w-80 bg-white rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.12)] z-50 overflow-hidden"
            >
              <!-- HEADER -->
              <div class="flex items-center justify-between px-4 py-3 bg-gray-50">
                <span class="font-semibold text-gray-800">Thông báo</span>

                <button
                  *ngIf="unreadCount > 0"
                  (click)="markAllAsRead()"
                  class="text-xs text-[#00C897] hover:opacity-70"
                >
                  Đánh dấu tất cả
                </button>
              </div>

              <!-- LIST -->
              <div class="max-h-96 overflow-y-auto divide-y divide-gray-100">
                <div *ngIf="notifications.length > 0; else empty">
                  <div
                    *ngFor="let n of notifications"
                    (click)="goToNotification(n)"
                    class="flex items-start gap-3 px-4 py-3 cursor-pointer transition"
                    [ngClass]="{
                      'bg-emerald-50 hover:bg-emerald-100': !n.isRead,
                      'hover:bg-gray-50': n.isRead,
                    }"
                  >
                    <!-- ICON -->
                    <div
                      class="w-9 h-9 flex items-center justify-center rounded-full flex-shrink-0"
                      [ngClass]="{
                        'bg-emerald-50 text-emerald-600': n.title
                          ?.toLowerCase()
                          .includes('xác thực'),

                        'bg-indigo-50 text-indigo-600':
                          n.title?.toLowerCase().includes('phòng') ||
                          n.title?.toLowerCase().includes('đăng'),

                        'bg-blue-50 text-blue-600': n.title?.toLowerCase().includes('tin nhắn'),

                        'bg-orange-100 text-gray-500': n.title.toLowerCase().includes('chỉnh sửa'),
                      }"
                    >
                      <!-- VERIFY ICON -->
                      <svg
                        *ngIf="n.title?.toLowerCase().includes('xác thực')"
                        class="w-4 h-4"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="M9 12l2 2 4-4m5.6-4A11.9 11.9 0 0112 3a11.9 11.9 0 01-8.6 3A12 12 0 003 9c0 5.6 3.8 10.3 9 11.6 5.2-1.3 9-6 9-11.6 0-1-.1-2-.4-3z"
                        />
                      </svg>

                      <!-- ROOM ICON -->
                      <svg
                        *ngIf="!n.title?.toLowerCase().includes('xác thực')"
                        class="w-4 h-4"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"
                        />
                      </svg>
                    </div>

                    <!-- CONTENT -->
                    <div class="flex-1 min-w-0">
                      <p class="text-sm font-semibold text-gray-800 truncate">
                        {{ n.title }}
                      </p>

                      <p class="text-xs text-gray-500 line-clamp-2">
                        {{ n.content }}
                      </p>

                      <p class="text-[11px] text-gray-400 mt-1">
                        {{ n.createdAt | date: 'short' }}
                      </p>
                    </div>

                    <!-- UNREAD DOT -->
                    <div *ngIf="!n.isRead" class="w-2 h-2 bg-emerald-500 rounded-full mt-2"></div>
                  </div>
                </div>
              </div>

              <!-- EMPTY -->
              <ng-template #empty>
                <div class="flex flex-col items-center justify-center py-10 text-gray-400">
                  <svg class="w-8 h-8 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-width="1.5" d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
                  </svg>
                  <p class="text-sm">Không có thông báo</p>
                </div>
              </ng-template>
            </div>
          </div>
          <button
            routerLink="/chat"
            routerLinkActive="active-link"
            class="nav-btn flex items-center space-x-1 px-3 py-2 border border-gray-300 text-gray-700 hover:border-[#00C897] hover:text-[#00C897] rounded-lg transition-colors cursor-pointer text-sm font-medium"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"
              />
            </svg>
            <span>Liên hệ</span>
          </button>
          <button
            routerLink="/my-posts"
            routerLinkActive="active-link"
            class="nav-btn flex items-center space-x-1 px-3 py-2 border border-gray-300 text-gray-700 hover:border-[#00C897] hover:text-[#00C897] rounded-lg transition-colors cursor-pointer text-sm font-medium"
          >
            <span>Quản lý tin</span>
          </button>
        </div>
        <app-user-avatar-dropdown size="md"></app-user-avatar-dropdown>
      </div>
    </div>

    <!-- Mobile: tim + chuông + hamburger -->
    <div class="lg:hidden flex items-center space-x-1">
      <!-- ❤️ Saved -->
      <button
        *ngIf="currentUser"
        routerLink="/saved"
        class="p-2 text-gray-500 hover:text-[#FF6B6B] rounded-lg transition-colors cursor-pointer"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
          />
        </svg>
      </button>

      <!-- 🔔 NOTIFICATION -->
      <div class="relative" *ngIf="currentUser">
        <button
          (click)="toggleNotification()"
          class="p-2 text-gray-500 hover:text-[#00C897] rounded-lg transition-colors relative"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
            />
          </svg>

          <!-- badge -->
          <span
            *ngIf="unreadCount > 0"
            class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full"
          >
            {{ unreadCount > 99 ? '99+' : unreadCount }}
          </span>
        </button>

        <!-- dropdown -->
        <div
          *ngIf="showNotification"
          class="absolute right-0 mt-2 w-80 bg-white rounded-2xl shadow-[0_8px_30px_rgba(0,0,0,0.12)] z-50 overflow-hidden"
        >
          <div class="p-3 border-b font-semibold text-gray-700">Thông báo</div>

          <div *ngIf="notifications.length > 0; else empty">
            <div
              *ngFor="let n of notifications"
              (click)="goToNotification(n)"
              class="noti p-3 hover:bg-gray-100 cursor-pointer"
            >
              <div class="text-sm font-medium">{{ n.title }}</div>
              <div class="text-xs text-gray-500">{{ n.content }}</div>
            </div>
          </div>

          <ng-template #empty>
            <div class="p-4 text-center text-gray-400 text-sm">Không có thông báo</div>
          </ng-template>
        </div>
      </div>

      <!-- ☰ MENU -->
      <button
        (click)="toggleMenu()"
        class="p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors cursor-pointer"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>
    </div>
  </nav>

  <!-- Mobile dropdown menu (chỉ Tìm phòng + Blog) -->
  <div *ngIf="isOpen" class="lg:hidden bg-white border-t shadow-lg">
    <div class="px-4 py-3 space-y-1">
      <a
        routerLink="/search"
        (click)="toggleMenu()"
        routerLinkActive="active-link"
        class="nav-link block py-3 px-2 font-medium text-gray-700 hover:text-[#00C897] hover:bg-gray-50 rounded-lg cursor-pointer transition-colors"
      >
        Tìm phòng
      </a>
      <a
        routerLink="/blog"
        (click)="toggleMenu()"
        routerLinkActive="active-link"
        class="nav-link block py-3 px-2 font-medium text-gray-700 hover:text-[#00C897] hover:bg-gray-50 rounded-lg cursor-pointer transition-colors"
      >
        Blog
      </a>
      <div class="pt-2 border-t border-gray-100">
        <button
          *ngIf="!currentUser"
          (click)="openLoginModal(); toggleMenu()"
          class="w-full border-2 border-[#00C897] text-[#00C897] px-4 py-2 rounded-lg font-medium hover:bg-[#00C897]/10 transition-colors"
        >
          Đăng nhập
        </button>
        <button
          (click)="goToPostRoom(); toggleMenu()"
          class="w-full mt-2 bg-[#FF6B6B] text-white px-4 py-2 rounded-full hover:bg-[#FF5E3A] transition-colors font-bold"
        >
          Đăng tin
        </button>
      </div>
    </div>
  </div>

  <!-- Login modal -->
  <app-login-modal
    *ngIf="isLoginModalOpen"
    (close)="closeLoginModal()"
    (loginSuccess)="onLoginSuccess()"
  ></app-login-modal>

  <!-- Modal xác nhận đăng xuất -->
  <app-confirm-logout-modal
    *ngIf="isConfirmLogoutOpen"
    (confirm)="confirmLogout()"
    (cancel)="isConfirmLogoutOpen = false"
  ></app-confirm-logout-modal>
</header>

<!-- ===== MOBILE BOTTOM NAV BAR ===== -->
<nav
  class="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.08)]"
>
  <div class="flex items-center justify-around px-2">
    <!-- Trang chủ -->
    <a
      routerLink="/"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: true }"
      class="nav-link flex flex-col items-center py-2 px-3 text-gray-500 hover:text-[#00C897] transition-colors cursor-pointer min-w-0"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
        />
      </svg>
      <span class="text-xs font-medium mt-0.5">Trang chủ</span>
    </a>

    <!-- Quản lý tin -->
    <a
      routerLink="/my-posts"
      routerLinkActive="active-link"
      class="flex flex-col items-center py-2 px-3 text-gray-500 hover:text-[#00C897] transition-colors cursor-pointer min-w-0"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a2 2 0 012-2z"
        />
      </svg>
      <span class="text-xs font-medium mt-0.5">Quản lý tin</span>
    </a>

    <!-- Đăng tin nổi bật -->
    <div class="flex flex-col items-center -mt-5 cursor-pointer" (click)="goToPostRoom()">
      <button
        class="w-14 h-14 bg-[#FF6B6B] rounded-full flex items-center justify-center shadow-lg hover:bg-[#FF5E3A] transition-colors border-4 border-white cursor-pointer"
      >
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2.5"
            d="M12 4v16m8-8H4"
          />
        </svg>
      </button>
      <span class="text-xs font-medium text-gray-600 mt-1">Đăng tin</span>
    </div>

    <!-- Liên hệ -->
    <button
      (click)="goToChat()"
      class="flex flex-col items-center py-2 px-3 text-gray-500 hover:text-[#00C897] transition-colors cursor-pointer min-w-0"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"
        />
      </svg>
      <span class="text-xs font-medium mt-0.5">Liên hệ</span>
    </button>

    <!-- Tài khoản: dùng shared dropdown, size="sm" -->
    <div class="flex flex-col items-center py-2 px-3 cursor-pointer min-w-0">
      <button
        *ngIf="!currentUser"
        (click)="openLoginModal()"
        class="flex flex-col items-center text-gray-500 hover:text-[#00C897] transition-colors"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
          />
        </svg>
        <span class="text-xs font-medium mt-0.5">Tài khoản</span>
      </button>

      <!-- ✅ Shared dropdown, mobile size="sm" -->
      <app-user-avatar-dropdown *ngIf="currentUser" size="sm"></app-user-avatar-dropdown>
      <span *ngIf="currentUser" class="text-xs font-medium mt-0.5 text-[#00C897]">Tài khoản</span>
    </div>
  </div>
</nav>
